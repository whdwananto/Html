<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake AI - SMART BALANCED (FIX LOOP)</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
    font-family:Arial;
}
#wrap{
    width:90vw;
    max-width:600px;
    aspect-ratio:1/1;
}
canvas{
    width:100%;
    height:100%;
    background:black;
    border:4px solid lime;
}
button{
    margin-top:10px;
    padding:10px 25px;
    font-size:18px;
    background:lime;
    border:none;
}
</style>
</head>

<body>

<h2>Snake AI - SMART BALANCED</h2>

<div id="wrap">
<canvas id="game"></canvas>
</div>

<button id="startBtn">Start</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const SIZE=600;
const GRID=20;

canvas.width=SIZE;
canvas.height=SIZE;

const CELL=SIZE/GRID;

let snake,food,interval,gameRunning=false;
let loopCounter=0;

/* ========================= */
function init(){
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    food=randomFood();
    gameRunning=true;
    loopCounter=0;
}

/* ========================= */
function randomFood(){
    let f;
    do{
        f={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};
    }while(snake.some(s=>s.x===f.x&&s.y===f.y));
    return f;
}

function inBounds(p){
    return p.x>=0&&p.x<GRID&&p.y>=0&&p.y<GRID;
}

function hitBody(p,body){
    return body.some(s=>s.x===p.x&&s.y===p.y);
}

function neighbors(p){
    return [
        {x:p.x+1,y:p.y},
        {x:p.x-1,y:p.y},
        {x:p.x,y:p.y+1},
        {x:p.x,y:p.y-1}
    ];
}

/* ========================= */
function floodFill(start,body){
    let q=[start];
    let vis=new Set();
    let count=0;

    while(q.length){
        let p=q.shift();
        let k=p.x+","+p.y;

        if(vis.has(k)) continue;
        vis.add(k);
        count++;

        for(let n of neighbors(p)){
            if(!inBounds(n)) continue;
            if(hitBody(n,body)) continue;
            q.push(n);
        }
    }
    return count;
}

/* ========================= */
function canReachTail(body){
    let head=body[0];
    let tail=body[body.length-1];

    let q=[head];
    let vis=new Set();
    let blocked=new Set(body.map(s=>s.x+","+s.y));

    while(q.length){
        let p=q.shift();
        let k=p.x+","+p.y;

        if(vis.has(k)) continue;
        vis.add(k);

        if(p.x===tail.x&&p.y===tail.y) return true;

        for(let n of neighbors(p)){
            if(!inBounds(n)) continue;

            let key=n.x+","+n.y;
            if(!(n.x===tail.x&&n.y===tail.y) && blocked.has(key)) continue;

            q.push(n);
        }
    }
    return false;
}

/* ========================= */
function bfs(start,target,body){
    let q=[{p:start,path:[]}];
    let vis=new Set();
    let blocked=new Set(body.map(s=>s.x+","+s.y));

    while(q.length){
        let {p,path}=q.shift();
        let key=p.x+","+p.y;

        if(vis.has(key)) continue;
        vis.add(key);

        if(p.x===target.x && p.y===target.y){
            return path;
        }

        for(let n of neighbors(p)){
            if(!inBounds(n)) continue;
            if(blocked.has(n.x+","+n.y)) continue;

            q.push({p:n,path:[...path,n]});
        }
    }
    return null;
}

/* ========================= */
function autoMove(){
    let head=snake[0];
    let tail=snake[snake.length-1];

    loopCounter++;

    let pathToFood=bfs(head,food,snake);

    /* 🔥 SMART EAT (FIX LOOP) */
    if(pathToFood && pathToFood.length){
        let next=pathToFood[0];

        let sim=[{...next},...snake];
        let grow=(next.x===food.x && next.y===food.y);
        if(!grow) sim.pop();

        if(canReachTail(sim)){
            let space=floodFill(next,sim);

            if(space > snake.length * 0.5 || loopCounter > 2){
                move(next);
                loopCounter = 0;
                return;
            }
        }
    }

    /* FOLLOW TAIL */
    let pathToTail=bfs(head,tail,snake);

    if(pathToTail && pathToTail.length){
        move(pathToTail[0]);
        return;
    }

    /* EXPAND */
    let best=null;
    let bestScore=-1;

    for(let n of neighbors(head)){
        if(!inBounds(n)) continue;
        if(hitBody(n,snake)) continue;

        let sim=[{...n},...snake];
        sim.pop();

        if(!canReachTail(sim)) continue;

        let space=floodFill(n,sim);

        if(space>bestScore){
            bestScore=space;
            best=n;
        }
    }

    if(best) move(best);
}

/* ========================= */
function move(p){
    let grow=(p.x===food.x&&p.y===food.y);

    snake.unshift(p);

    if(grow){
        food=randomFood();
    }else{
        snake.pop();
    }
}

/* ========================= */
function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,SIZE,SIZE);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*CELL,food.y*CELL,CELL,CELL);

    snake.forEach((s,i)=>{
        ctx.fillStyle=i===0?"lime":"#00ccff";
        ctx.fillRect(s.x*CELL,s.y*CELL,CELL-2,CELL-2);
    });
}

/* ========================= */
function loop(){
    if(!gameRunning) return;
    autoMove();
    draw();
}

/* ========================= */
document.getElementById("startBtn").onclick=()=>{
    clearInterval(interval);
    init();
    interval=setInterval(loop,30);
};

init();
draw();
</script>

</body>
</html>
