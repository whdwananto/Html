<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake AI Random Pattern</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
color:white;
font-family:Arial;
flex-direction:column;
}

canvas{
background:black;
border:4px solid lime;
}

button{
margin-top:10px;
padding:10px 25px;
font-size:18px;
cursor:pointer;
background:lime;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Snake AI Random Path</h2>
<canvas id="game"></canvas>
<button id="startBtn">Start / Restart</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const tile=20;
let grid;

let snake,food,score,interval;
let path=[];
let indexMap={};

function resizeCanvas(){

let size=Math.min(window.innerWidth,window.innerHeight)-120;

canvas.width=size;
canvas.height=size;

grid=size/tile;

}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function generateRandomHamiltonian(){

path=[];
indexMap={};

let visited=Array(tile).fill().map(()=>Array(tile).fill(false));

let stack=[{x:0,y:0}];

while(stack.length){

let cell=stack.pop();

if(visited[cell.y][cell.x]) continue;

visited[cell.y][cell.x]=true;

path.push(cell);

let dirs=shuffle([
{x:1,y:0},
{x:-1,y:0},
{x:0,y:1},
{x:0,y:-1}
]);

for(let d of dirs){

let nx=cell.x+d.x;
let ny=cell.y+d.y;

if(nx>=0 && ny>=0 && nx<tile && ny<tile){

if(!visited[ny][nx]){

stack.push({x:nx,y:ny});

}

}

}

}

path.forEach((p,i)=>{
indexMap[p.x+","+p.y]=i;
});

}

function initGame(){

generateRandomHamiltonian();

snake=[{...path[0]}];

food=randomFood();
score=0;

}

function randomFood(){

let f;

do{

f={
x:Math.floor(Math.random()*tile),
y:Math.floor(Math.random()*tile)
};

}while(snake.some(s=>s.x===f.x && s.y===f.y));

return f;

}

function nextPathCell(head){

let idx=indexMap[head.x+","+head.y];

let nextIndex=(idx+1)%path.length;

return path[nextIndex];

}

function validShortcut(head,target){

let headIndex=indexMap[head.x+","+head.y];
let targetIndex=indexMap[target.x+","+target.y];
let tail=snake[snake.length-1];
let tailIndex=indexMap[tail.x+","+tail.y];

if(headIndex<targetIndex){
return targetIndex<tailIndex;
}else{
return targetIndex>headIndex||targetIndex<tailIndex;
}

}

function autoMove(){

let head=snake[0];

let next=nextPathCell(head);

let dirs=[
{x:1,y:0},
{x:-1,y:0},
{x:0,y:1},
{x:0,y:-1}
];

for(let d of dirs){

let nx=head.x+d.x;
let ny=head.y+d.y;

if(nx<0||ny<0||nx>=tile||ny>=tile) continue;

if(nx==food.x && ny==food.y){

let target={x:nx,y:ny};

if(validShortcut(head,target)){

next=target;
break;

}

}

}

move(next);

}

function move(next){

snake.unshift(next);

if(next.x==food.x && next.y==food.y){

score++;
food=randomFood();

}else{

snake.pop();

}

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

snake.forEach((s,i)=>{

ctx.fillStyle=i==0?"#00ff88":"lime";
ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);

});

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,25);

}

function loop(){

autoMove();
draw();

}

document.getElementById("startBtn").onclick=function(){

initGame();

clearInterval(interval);

interval=setInterval(loop,1);

};

initGame();
draw();

</script>

</body>
</html>
