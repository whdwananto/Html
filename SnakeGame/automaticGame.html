<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake AI Pro</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
color:white;
font-family:Arial;
flex-direction:column;
}

canvas{
background:black;
border:4px solid lime;
}

button{
margin-top:10px;
padding:10px 25px;
font-size:18px;
cursor:pointer;
background:lime;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Snake AI Pro</h2>
<canvas id="game"></canvas>
<button id="startBtn">Start / Restart</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const tile=20;
let grid;

let snake, food, score, interval=null;

function resizeCanvas(){
let size=Math.min(window.innerWidth,window.innerHeight)-120;
canvas.width=size;
canvas.height=size;
grid=size/tile;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function initGame(){
snake=[{x:10,y:10}];
food=randomFood();
score=0;
}

function randomFood(){
let f;
do{
f={
x:Math.floor(Math.random()*tile),
y:Math.floor(Math.random()*tile)
};
}while(snake.some(s=>s.x===f.x && s.y===f.y));
return f;
}

function collision(pos, body){
return body.some(s=>s.x===pos.x && s.y===pos.y);
}

function neighbors(pos){
return [
{x:pos.x+1,y:pos.y},
{x:pos.x-1,y:pos.y},
{x:pos.x,y:pos.y+1},
{x:pos.x,y:pos.y-1}
];
}

function inBounds(p){
return p.x>=0 && p.y>=0 && p.x<tile && p.y<tile;
}

function bfs(start, target, body){

let queue=[{pos:start, path:[]}];
let visited=new Set();

while(queue.length){

let {pos,path}=queue.shift();
let key=pos.x+","+pos.y;

if(visited.has(key)) continue;
visited.add(key);

if(pos.x===target.x && pos.y===target.y){
return path;
}

for(let n of neighbors(pos)){

if(!inBounds(n)) continue;

// allow tail (last element)
if(collision(n, body.slice(0, body.length-1))) continue;

queue.push({
pos:n,
path:[...path,n]
});

}

}

return null;
}

function simulateSnake(body, path){

let newSnake=[...body];

for(let step of path){

newSnake.unshift(step);

// jika bukan makan terakhir
if(!(step.x===food.x && step.y===food.y)){
newSnake.pop();
}

}

return newSnake;
}

function safeAfterEat(path){

let newSnake=simulateSnake(snake, path);

let newHead=newSnake[0];
let newTail=newSnake[newSnake.length-1];

let pathToTail=bfs(newHead,newTail,newSnake);

return pathToTail!=null;
}

function autoMove(){

let head=snake[0];
let tail=snake[snake.length-1];

// 1. coba ke makanan
let pathToFood=bfs(head,food,snake);

if(pathToFood && safeAfterEat(pathToFood)){

move(pathToFood[0]);
return;

}

// 2. fallback ke tail
let pathToTail=bfs(head,tail,snake);

if(pathToTail){

move(pathToTail[0]);
return;

}

// 3. last resort (random aman)
let dirs=neighbors(head);

for(let d of dirs){

if(inBounds(d) && !collision(d,snake)){
move(d);
return;
}

}

// mati
resetGame();

}

function move(next){

snake.unshift(next);

if(next.x===food.x && next.y===food.y){
score++;
food=randomFood();
}else{
snake.pop();
}

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

snake.forEach((s,i)=>{

if(i===0){

ctx.fillStyle="#00ff88";
ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);

}else{

ctx.fillStyle="lime";
ctx.fillRect(s.x*grid,s.y*grid,grid-2,grid-2);

}

});

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,25);

}

function loop(){
autoMove();
draw();
}

function resetGame(){
clearInterval(interval);
interval=null;
}

document.getElementById("startBtn").onclick=function(){

initGame();

if(interval) clearInterval(interval);

interval=setInterval(loop,60);

};

initGame();
draw();

</script>

</body>
</html>
