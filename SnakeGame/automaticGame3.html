<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake AI Stable Fixed</title>

<style>
body{
margin:0;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
font-family:Arial;
}

canvas{
background:black;
border:4px solid lime;
}

button{
margin-top:10px;
padding:10px 25px;
font-size:18px;
background:lime;
border:none;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Snake AI</h2>
<canvas id="game"></canvas>
<button id="startBtn">Start / Restart</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const GRID=20;

let CELL;
let snake;
let food;
let score;
let interval;
let gameRunning=false;

let hamiltonian=[];
let indexMap={};

// 🎨 PALET WARNA (bisa ditambah)
const COLORS = [
  "#00ff88", // hijau neon
  "#00ccff", // biru
  "#ffcc00", // kuning
  "#ff00ff", // ungu
  "#ff6600", // orange
  "#ff3333", // merah
  "#33ffcc", // cyan
  "#cc66ff"  // violet
];

function getSnakeColor(index){
  let group = Math.floor(index / 10); // tiap 10 segmen ganti warna
  return COLORS[group % COLORS.length];
}

function resizeCanvas(){

let size=Math.min(window.innerWidth,window.innerHeight)-120;
size=Math.floor(size/GRID)*GRID;

canvas.width=size;
canvas.height=size;

CELL=size/GRID;

}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);



function generateHamiltonian(){

hamiltonian=[];
indexMap={};

for(let y=0;y<GRID;y++){

if(y%2===0){

for(let x=0;x<GRID;x++){
hamiltonian.push({x,y});
}

}else{

for(let x=GRID-1;x>=0;x--){
hamiltonian.push({x,y});
}

}

}

hamiltonian.forEach((p,i)=>{
indexMap[p.x+","+p.y]=i;
});

}



function initGame(){

generateHamiltonian();

snake=[{x:10,y:10}];

food=randomFood();

score=0;

gameRunning=true;

}



function randomFood(){

let f;

do{

f={
x:Math.floor(Math.random()*GRID),
y:Math.floor(Math.random()*GRID)
};

}while(snake.some(s=>s.x===f.x && s.y===f.y));

return f;

}



function neighbors(pos){

return[
{x:pos.x+1,y:pos.y},
{x:pos.x-1,y:pos.y},
{x:pos.x,y:pos.y+1},
{x:pos.x,y:pos.y-1}
];

}



function inBounds(p){
return p.x>=0 && p.y>=0 && p.x<GRID && p.y<GRID;
}



function hitBody(p,body=snake){

return body.some((s,i)=>
i !== body.length-1 && s.x===p.x && s.y===p.y
);

}



function bfs(start,target,body=snake){

let queue=[{pos:start,path:[]}];
let visited=new Set();

while(queue.length){

let {pos,path}=queue.shift();

let key=pos.x+","+pos.y;

if(visited.has(key)) continue;

visited.add(key);

if(pos.x===target.x && pos.y===target.y){
return path;
}

for(let n of neighbors(pos)){

if(!inBounds(n)) continue;

let isBody = body.some((s,i)=>
(i !== body.length-1) && s.x===n.x && s.y===n.y
);

if(isBody) continue;

queue.push({
pos:n,
path:[...path,n]
});

}

}

return null;

}



function nextHamiltonian(head){

let idx=indexMap[head.x+","+head.y];
let nextIndex=(idx+1)%hamiltonian.length;

return hamiltonian[nextIndex];

}



function autoMove(){

let head=snake[0];

let path=bfs(head,food);

if(path && path.length){

let next=path[0];

let testSnake=JSON.parse(JSON.stringify(snake));

testSnake.unshift(next);

if(!(next.x===food.x && next.y===food.y)){
testSnake.pop();
}

let tail=testSnake[testSnake.length-1];
let safe=bfs(next,tail,testSnake);

if(safe){
move(next);
return;
}

}

let tail=snake[snake.length-1];
let pathTail=bfs(head,tail);

if(pathTail && pathTail.length){
move(pathTail[0]);
return;
}

let next=nextHamiltonian(head);
move(next);

}



function move(next){

if(!inBounds(next)){
gameOver();
return;
}

if(hitBody(next)){
gameOver();
return;
}

snake.unshift(next);

if(next.x===food.x && next.y===food.y){

score++;
food=randomFood();

}else{

snake.pop();

}

}



function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.fillRect(food.x*CELL,food.y*CELL,CELL,CELL);

// 🐍 DRAW SNAKE MULTICOLOR
snake.forEach((s,i)=>{

ctx.fillStyle = getSnakeColor(i);

ctx.fillRect(s.x*CELL,s.y*CELL,CELL-2,CELL-2);

});

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,25);

if(!gameRunning){

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(
"GAME OVER",
canvas.width/2-130,
canvas.height/2
);

}

}



function gameOver(){

gameRunning=false;
clearInterval(interval);

}



function loop(){

if(!gameRunning) return;

autoMove();
draw();

}



document.getElementById("startBtn").onclick=function(){

clearInterval(interval);

initGame();

interval=setInterval(loop,60);

};



initGame();
draw();

</script>

</body>
</html>
