<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <title>Pemesanan Tiket</title>
</head>

<body>

    <h1>Pemesanan Tiket</h1>

    <h2>Tiket Kereta Api</h2>
    <form>
        <label for="nama">Nama: </label>
        <input type="text" id="nama" name="nama"><br>

        <label for="asal">Stasiun Asal: </label>
        <input type="text" id="asal" name="asal"><br>

        <label for="tujuan">Stasiun Tujuan: </label>
        <input type="text" id="tujuan" name="tujuan"><br>

        <label for="tanggal">Tanggal Berangkat: </label>
        <input type="date" id="tanggal" name="tanggal"><br>

        <label for="kelas">Kelas: </label>
        <select id="kelas" name="kelas">
            <option value="ekonomi">Ekonomi</option>
            <option value="bisnis">Bisnis</option>
            <option value="executive">Executive</option>
        </select><br>

        <label for="bagasi">Berat Bagasi: </label>
        <input type="number" id="bagasi" name="bagasi" min="0" max="50"><br>

        <button type="button" onclick="submitKereta()">Pesan</button>
    </form>

    <h2>Tiket Pesawat</h2>
    <form>
        <label for="nama">Nama: </label>
        <input type="text" id="nama" name="nama"><br>

        <label for="asal">Bandara Asal: </label>
        <input type="text" id="asal" name="asal"><br>

        <label for="tujuan">Bandara Tujuan: </label>
        <input type="text" id="tujuan" name="tujuan"><br>

        <label for="tanggal">Tanggal Berangkat: </label>
        <input type="date" id="tanggal" name="tanggal"><br>

        <label for="kelas">Kelas: </label>
        <select id="kelas" name="kelas">
            <option value="ekonomi">Ekonomi</option>
            <option value="bisnis">Bisnis</option>
            <option value="first">First Class</option>
        </select><br>

        <label for="bagasi">Berat Bagasi: </label>
        <input type="number" id="bagasi" name="bagasi" min="0" max="30"><br>

        <label for="makanan">Makanan: </label>
        <input type="checkbox" id="makanan" name="makanan"><br>

        <button type="button" onclick="submitPesawat()">Pesan</button>
    </form>

    <script>
        class TiketKeretaApiBuilder {
            constructor(nama, asal, tujuan, tanggal, kelas, bagasi) {
                this.nama = nama;
                this.asal = asal;
                this.tujuan = tujuan;
                this.tanggal = tanggal;
                this.kelas = kelas;
                this.bagasi = bagasi;

            }

            setNama(nama) {
                this.nama = nama;
                return this;
            }

            setAsal(asal) {
                this.asal = asal;
                return this;
            }

            setTujuan(tujuan) {
                this.tujuan = tujuan;
                return this;
            }

            setTanggal(tanggal) {
                this.tanggal = tanggal;
                return this;
            }

            setKelas(kelas) {
                this.kelas = kelas;
                return this;
            }

            setBagasi(bagasi) {
                this.bagasi = bagasi;
                return this;
            }

            build() {
                return new TiketKeretaApi(this.nama, this.asal, this.tujuan, this.tanggal, this.kelas, this.bagasi);
            }
        }

        class TiketKeretaApi {
            constructor(nama, asal, tujuan, tanggal, kelas, bagasi) {
                this.nama = nama;
                this.asal = asal;
                this.tujuan = tujuan;
                this.tanggal = tanggal;
                this.kelas = kelas;
                this.bagasi = bagasi;
            }

            print() {
                console.log(`Tiket Kereta Api: ${this.nama}, ${this.asal} - ${this.tujuan}, ${this.tanggal}, ${this.kelas}, ${this.bagasi}kg`);
            }
        }

        function submitKereta() {
            const nama = document.getElementById("nama").value;
            const asal = document.getElementById("asal").value;
            const tujuan = document.getElementById("tujuan").value;
            const tanggal = document.getElementById("tanggal").value;
            const kelas = document.getElementById("kelas").value;
            const bagasi = document.getElementById("bagasi").value;

            const tiket = new TiketKeretaApiBuilder()
                .setNama(nama)
                .setAsal(asal)
                .setTujuan(tujuan)
                .setTanggal(tanggal)
                .setKelas(kelas)
                .setBagasi(bagasi)
                .build();

            tiket.print();
        }

        class TiketPesawatBuilder {
            constructor(nama, asal, tujuan, tanggal, kelas, bagasi, makanan) {
                this.nama = nama;
                this.asal = asal;
                this.tujuan = tujuan;
                this.tanggal = tanggal;
                this.kelas = kelas;
                this.bagasi = bagasi;
                this.makanan = makanan;
            }

            setNama(nama) {
                this.nama = nama;
                return this;
            }

            setAsal(asal) {
                this.asal = asal;
                return this;
            }

            setTujuan(tujuan) {
                this.tujuan = tujuan;
                return this;
            }

            setTanggal(tanggal) {
                this.tanggal = tanggal;
                return this;
            }

            setKelas(kelas) {
                this.kelas = kelas;
                return this;
            }

            setBagasi(bagasi) {
                this.bagasi = bagasi;
                return this;
            }

            setMakanan(makanan) {
                this.makanan = makanan;
                return this;
            }

            build() {
                return new TiketPesawat(this.nama, this.asal, this.tujuan, this.tanggal, this.kelas, this.bagasi, this.makanan);
            }
        }

        class TiketPesawat {
            constructor(nama, asal, tujuan, tanggal, kelas, bagasi, makanan) {
                this.nama = nama;
                this.asal = asal;
                this.tujuan = tujuan;
                this.tanggal = tanggal;
                this.kelas = kelas;
                this.bagasi = bagasi;
                this.makanan = makanan;
            }
            print() {
                console.log(`Tiket Pesawat: ${this.nama}, ${this.asal} - ${this.tujuan}, ${this.tanggal}, ${this.kelas}, ${this.bagasi}kg, makanan: ${this.makanan}`);
            }
        }

        function submitPesawat() {
            const nama = document.getElementById("nama").value;
            const asal = document.getElementById("asal").value;
            const tujuan = document.getElementById("tujuan").value;
            const tanggal = document.getElementById("tanggal").value;
            const kelas = document.getElementById("kelas").value;
            const bagasi = document.getElementById("bagasi").value;
            const makanan = document.getElementById("makanan").value;

            const tiket = new TiketPesawatBuilder()
                .setNama(nama)
                .setAsal(asal)
                .setTujuan(tujuan)
                .setTanggal(tanggal)
                .setKelas(kelas)
                .setBagasi(bagasi)
                .setMakanan(makanan)
                .build();

            tiket.print();
        }
    </script>
</body>

</html>
