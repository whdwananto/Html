<!DOCTYPE html>
<html>

<head>
    <title>Pemesanan Tiket</title>
</head>

<body>

    <h1>Pemesanan Tiket</h1>

    <h2>Tiket Kereta Api</h2>
    <form>
        <label for="nama">Nama: </label>
        <input type="text" id="nama-kereta" name="nama"><br>

        <label for="asal">Stasiun Asal: </label>
        <input type="text" id="asal-kereta" name="asal"><br>

        <label for="tujuan">Stasiun Tujuan: </label>
        <input type="text" id="tujuan-kereta" name="tujuan"><br>

        <label for="tanggal">Tanggal Berangkat: </label>
        <input type="date" id="tanggal-kereta" name="tanggal"><br>

        <label for="kelas">Kelas: </label>
        <select id="kelas-kereta" name="kelas">
            <option value="ekonomi">Ekonomi</option>
            <option value="bisnis">Bisnis</option>
            <option value="executive">Executive</option>
        </select><br>

        <label for="bagasi">Berat Bagasi: </label>
        <input type="number" id="bagasi-kereta" name="bagasi" min="0" max="50"><br>

        <button type="button" onclick="submitKereta()">Pesan</button>
    </form>

    <h2>Tiket Pesawat</h2>
    <form>
        <label for="nama">Nama: </label>
        <input type="text" id="nama-pesawat" name="nama"><br>

        <label for="asal">Bandara Asal: </label>
        <input type="text" id="asal-pesawat" name="asal"><br>

        <label for="tujuan">Bandara Tujuan: </label>
        <input type="text" id="tujuan-pesawat" name="tujuan"><br>

        <label for="tanggal">Tanggal Berangkat: </label>
        <input type="date" id="tanggal-pesawat" name="tanggal"><br>

        <label for="kelas">Kelas: </label>
        <select id="kelas-pesawat" name="kelas">
            <option value="ekonomi">Ekonomi</option>
            <option value="bisnis">Bisnis</option>
            <option value="first">First Class</option>
        </select><br>

        <label for="bagasi">Berat Bagasi: </label>
        <input type="number" id="bagasi-pesawat" name="bagasi" min="0" max="30"><br>

        <label for="makanan">Makanan: </label>
        <input type="checkbox" id="makanan-pesawat" name="makanan"><br>

        <button type="button" onclick="submitPesawat()">Pesan</button>
    </form>

    <script>
        function submitKereta() {
            const nama = document.getElementById("nama-kereta").value;
            const asal = document.getElementById("asal-kereta").value;
            const tujuan = document.getElementById("tujuan-kereta").value;
            const tanggal = document.getElementById("tanggal-kereta").value;
            const kelas = document.getElementById("kelas-kereta").value;
            const bagasi = document.getElementById("bagasi-kereta").value;
    
            const tiketKereta = {
                jenis: "Kereta Api",
                nama: nama,
                asal: asal,
                tujuan: tujuan,
                tanggal: tanggal,
                kelas: kelas,
                bagasi: bagasi
            };
    
            console.log(tiketKereta);
        }
        function submitPesawat() {
            const nama = document.getElementById("nama-pesawat").value;
            const asal = document.getElementById("asal-pesawat").value;
            const tujuan = document.getElementById("tujuan-pesawat").value;
            const tanggal = document.getElementById("tanggal-pesawat").value;
            const kelas = document.getElementById("kelas-pesawat").value;
            const bagasi = document.getElementById("bagasi-pesawat").value;
    
            const tiketPesawat = {
                jenis: "Kereta Api",
                nama: nama,
                asal: asal,
                tujuan: tujuan,
                tanggal: tanggal,
                kelas: kelas,
                bagasi: bagasi
            };
    
            console.log(tiketPesawat);
        }
        
    </script>
